AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: TnG FinHack 26 core data infrastructure for SME supply chain financing

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Deployment environment suffix used for resource naming.
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret for auth tokens. Set via --parameter-overrides or samconfig.toml.
    MinLength: 16
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS allowed origin for API responses. Use '*' for dev; restrict to your frontend domain in production.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256

Resources:
  InvoiceUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "tng-finhack-${Environment}-invoice-uploads-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref AllowedOrigin
            AllowedMethods:
              - GET
              - PUT
              - POST
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "tng-finhack-${Environment}-users"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  InvoicesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "tng-finhack-${Environment}-invoices"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: smeId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SmeIdIndex
          KeySchema:
            - AttributeName: smeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  OffersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "tng-finhack-${Environment}-offers"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: smeId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SmeIdIndex
          KeySchema:
            - AttributeName: smeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  TransactionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "tng-finhack-${Environment}-transactions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: smeId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SmeIdIndex
          KeySchema:
            - AttributeName: smeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  LegacyTransactionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "tng-finhack-${Environment}-legacy-transactions"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  LegacyInvoicesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "tng-finhack-${Environment}-legacy-invoices"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: invoiceId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: invoiceId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: TnG-FinHack-26
        - Key: Environment
          Value: !Ref Environment

  InvoiceWebhookFunction:
    Type: AWS::Serverless::Function
    Description: Receives AI-extracted invoice payloads from Alibaba Cloud, validates via Pydantic, persists to DynamoDB, runs ML scoring, and generates a financing Offer.
    Properties:
      FunctionName: !Sub "tng-finhack-${Environment}-invoice-webhook"
      Handler: handler.handler
      CodeUri: lambda/invoice-webhook
      Role: !GetAtt InvoiceWebhookFunctionRole.Arn
      Environment:
        Variables:
          INVOICES_TABLE: !Ref InvoicesTable
          OFFERS_TABLE: !Ref OffersTable
          LOG_LEVEL: INFO
          ML_MODEL_DIR: /opt/python/ml/models
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Timeout: 30
      MemorySize: 256
      Events:
        WebhookPost:
          Type: Api
          Properties:
            Path: /api/webhook/invoice-parsed
            Method: POST
            RestApiId: !Ref TnGApiGateway

  TnGApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'POST,GET,OPTIONS'"
        AllowOrigin: !Sub "'${AllowedOrigin}'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization'"
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 25
          MetricsEnabled: true

  InvoiceWebhookFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tng-finhack-${Environment}-invoice-webhook-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvoiceWebhookDynamoWritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: PutValidatedInvoices
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt InvoicesTable.Arn
              - Sid: PutFinancingOffers
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt OffersTable.Arn

  AuthFunction:
    Type: AWS::Serverless::Function
    Description: Handles user registration, login, and profile retrieval with bcrypt password hashing and JWT tokens.
    Properties:
      FunctionName: !Sub "tng-finhack-${Environment}-auth"
      Handler: handler.handler
      CodeUri: lambda/auth
      Role: !GetAtt AuthFunctionRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          JWT_SECRET: !Ref JwtSecret
          LOG_LEVEL: INFO
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Timeout: 30
      MemorySize: 256
      Events:
        AuthRegister:
          Type: Api
          Properties:
            Path: /api/auth/register
            Method: POST
            RestApiId: !Ref TnGApiGateway
        AuthLogin:
          Type: Api
          Properties:
            Path: /api/auth/login
            Method: POST
            RestApiId: !Ref TnGApiGateway
        AuthMe:
          Type: Api
          Properties:
            Path: /api/auth/me
            Method: GET
            RestApiId: !Ref TnGApiGateway
        AuthForgotPassword:
          Type: Api
          Properties:
            Path: /api/auth/forgot-password
            Method: POST
            RestApiId: !Ref TnGApiGateway
        AuthResetPassword:
          Type: Api
          Properties:
            Path: /api/auth/reset-password
            Method: POST
            RestApiId: !Ref TnGApiGateway
        AuthChangePassword:
          Type: Api
          Properties:
            Path: /api/auth/change-password
            Method: POST
            RestApiId: !Ref TnGApiGateway

  ScoringFunction:
    Type: AWS::Serverless::Function
    Description: Legacy credit scoring, invoice lifecycle, shipment tracking, and analytics endpoints.
    Properties:
      FunctionName: !Sub "tng-finhack-${Environment}-scoring"
      Handler: handler.handler
      CodeUri: lambda/credit-scoring
      Role: !GetAtt ScoringFunctionRole.Arn
      Environment:
        Variables:
          TXN_TABLE: !Ref LegacyTransactionsTable
          INVOICE_TABLE: !Ref LegacyInvoicesTable
          JWT_SECRET: !Ref JwtSecret
          LOG_LEVEL: INFO
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Timeout: 30
      MemorySize: 256
      Events:
        TriggerPost:
          Type: Api
          Properties:
            Path: /trigger
            Method: POST
            RestApiId: !Ref TnGApiGateway
        TransactionsGet:
          Type: Api
          Properties:
            Path: /transactions/{userId}
            Method: GET
            RestApiId: !Ref TnGApiGateway
        TelemetryGet:
          Type: Api
          Properties:
            Path: /telemetry
            Method: GET
            RestApiId: !Ref TnGApiGateway
        InvoiceUploadPost:
          Type: Api
          Properties:
            Path: /invoice/upload
            Method: POST
            RestApiId: !Ref TnGApiGateway
        InvoiceAnalyzePost:
          Type: Api
          Properties:
            Path: /invoice/analyze
            Method: POST
            RestApiId: !Ref TnGApiGateway
        InvoiceOfferPost:
          Type: Api
          Properties:
            Path: /invoice/offer
            Method: POST
            RestApiId: !Ref TnGApiGateway
        InvoiceAcceptPost:
          Type: Api
          Properties:
            Path: /invoice/accept
            Method: POST
            RestApiId: !Ref TnGApiGateway
        InvoicesGet:
          Type: Api
          Properties:
            Path: /invoices/{userId}
            Method: GET
            RestApiId: !Ref TnGApiGateway
        ShipmentTrackPost:
          Type: Api
          Properties:
            Path: /shipment/track
            Method: POST
            RestApiId: !Ref TnGApiGateway
        ShipmentVerifyPost:
          Type: Api
          Properties:
            Path: /shipment/verify
            Method: POST
            RestApiId: !Ref TnGApiGateway
        AnalyticsGet:
          Type: Api
          Properties:
            Path: /analytics/{userId}
            Method: GET
            RestApiId: !Ref TnGApiGateway

  AuthFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tng-finhack-${Environment}-auth-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AuthDynamoAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadWriteUsers
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt UsersTable.Arn

  ScoringFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tng-finhack-${Environment}-scoring-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ScoringDynamoAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadWriteLegacyTransactions
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt LegacyTransactionsTable.Arn
              - Sid: ReadWriteLegacyInvoices
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource: !GetAtt LegacyInvoicesTable.Arn

  DisburseFunction:
    Type: AWS::Serverless::Function
    Description: Accepts a financing offer, performs idempotent disbursement with DuitNow mock, writes ledger, and updates wallet balance atomically.
    Properties:
      FunctionName: !Sub "tng-finhack-${Environment}-disburse"
      Handler: handler.handler
      CodeUri: lambda/disburse
      Role: !GetAtt DisbursementFunctionRole.Arn
      Environment:
        Variables:
          OFFERS_TABLE: !Ref OffersTable
          USERS_TABLE: !Ref UsersTable
          INVOICES_TABLE: !Ref InvoicesTable
          TRANSACTIONS_TABLE: !Ref TransactionsTable
          LOG_LEVEL: INFO
          MOCK_PAYMENT_GATEWAY_DELAY: "1.5"
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Timeout: 30
      MemorySize: 256
      Events:
        DisbursePost:
          Type: Api
          Properties:
            Path: /api/disburse
            Method: POST
            RestApiId: !Ref TnGApiGateway

  DisbursementFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tng-finhack-${Environment}-disbursement-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DisbursementDynamoAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOffersAndUsers
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt OffersTable.Arn
                  - !GetAtt InvoicesTable.Arn
              - Sid: UpdateWalletAndFundingState
                Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt OffersTable.Arn
                  - !GetAtt InvoicesTable.Arn
              - Sid: WriteDisbursementLedger
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt TransactionsTable.Arn

  ReconciliationFunction:
    Type: AWS::Serverless::Function
    Description: Generates Excel reconciliation reports from transaction ledger data.
    Properties:
      FunctionName: !Sub "tng-finhack-${Environment}-reconciliation"
      Handler: handler.handler
      CodeUri: lambda/excel-reconciliation
      Role: !GetAtt ReconciliationFunctionRole.Arn
      Environment:
        Variables:
          TXN_TABLE: !Ref LegacyTransactionsTable
          LOG_LEVEL: INFO
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Timeout: 29
      MemorySize: 512
      Events:
        ReconciliationDownload:
          Type: Api
          Properties:
            Path: /reconciliation/download
            Method: GET
            RestApiId: !Ref TnGApiGateway

  ReconciliationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tng-finhack-${Environment}-reconciliation-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReconciliationReadOnlyPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadLedgerForReports
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt LegacyTransactionsTable.Arn

Outputs:
  InvoiceUploadsBucketName:
    Description: S3 bucket used for invoice uploads before OCR and underwriting.
    Value: !Ref InvoiceUploadsBucket

  InvoiceWebhookApiUrl:
    Description: URL for the Alibaba Cloud invoice webhook endpoint.
    Value: !Sub "https://${TnGApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/webhook/invoice-parsed"

  DisburseApiUrl:
    Description: URL for the disbursement API endpoint.
    Value: !Sub "https://${TnGApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/disburse"

  AuthApiUrl:
    Description: URL for the auth API endpoints (login, register, me).
    Value: !Sub "https://${TnGApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/auth"

  UsersTableName:
    Description: DynamoDB table storing SME user profiles.
    Value: !Ref UsersTable

  InvoicesTableName:
    Description: DynamoDB table storing invoice records.
    Value: !Ref InvoicesTable

  OffersTableName:
    Description: DynamoDB table storing financing offers.
    Value: !Ref OffersTable

  TransactionsTableName:
    Description: DynamoDB table storing cashflow and financing transactions.
    Value: !Ref TransactionsTable
