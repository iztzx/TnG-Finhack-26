AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TnG FinHack 26 core data infrastructure for SME supply chain financing
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedPattern: ^[a-z0-9-]+$
    Description: Deployment environment suffix used for resource naming.
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
Resources:
  InvoiceUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: tng-finhack-${Environment}-invoice-uploads-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
        - AllowedOrigins:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          - POST
          - HEAD
          AllowedHeaders:
          - '*'
          ExposedHeaders:
          - ETag
          MaxAge: 3000
      VersioningConfiguration:
        Status: Enabled
      Tags:
      - Key: Project
        Value: TnG-FinHack-26
      - Key: Environment
        Value:
          Ref: Environment
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: tng-finhack-${Environment}-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
      - Key: Project
        Value: TnG-FinHack-26
      - Key: Environment
        Value:
          Ref: Environment
  InvoicesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: tng-finhack-${Environment}-invoices
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: smeId
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: SmeIdIndex
        KeySchema:
        - AttributeName: smeId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
      - Key: Project
        Value: TnG-FinHack-26
      - Key: Environment
        Value:
          Ref: Environment
  OffersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: tng-finhack-${Environment}-offers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      - AttributeName: smeId
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: SmeIdIndex
        KeySchema:
        - AttributeName: smeId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
      - Key: Project
        Value: TnG-FinHack-26
      - Key: Environment
        Value:
          Ref: Environment
  TransactionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: tng-finhack-${Environment}-transactions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
      - Key: Project
        Value: TnG-FinHack-26
      - Key: Environment
        Value:
          Ref: Environment
  InvoiceWebhookFunction:
    Type: AWS::Serverless::Function
    Description: Receives AI-extracted invoice payloads from Alibaba Cloud, validates
      via Pydantic, persists to DynamoDB, runs ML scoring, and generates a financing
      Offer.
    Properties:
      FunctionName:
        Fn::Sub: tng-finhack-${Environment}-invoice-webhook
      Handler: handler.handler
      CodeUri: InvoiceWebhookFunction
      Role:
        Fn::GetAtt:
        - InvoiceWebhookFunctionRole
        - Arn
      Environment:
        Variables:
          INVOICES_TABLE:
            Ref: InvoicesTable
          OFFERS_TABLE:
            Ref: OffersTable
          LOG_LEVEL: INFO
          ML_MODEL_DIR: /opt/ml/models
      Timeout: 30
      MemorySize: 256
      Events:
        WebhookPost:
          Type: Api
          Properties:
            Path: /api/webhook/invoice-parsed
            Method: POST
            RestApiId:
              Ref: TnGApiGateway
    Metadata:
      SamResourceId: InvoiceWebhookFunction
  TnGApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: Environment
      Cors:
        AllowMethods: '''POST,GET,OPTIONS'''
        AllowOrigin: '''*'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization'''
  InvoiceWebhookFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: tng-finhack-${Environment}-invoice-webhook-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: InvoiceWebhookDynamoWritePolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: PutValidatedInvoices
            Effect: Allow
            Action:
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            Resource:
              Fn::GetAtt:
              - InvoicesTable
              - Arn
          - Sid: PutFinancingOffers
            Effect: Allow
            Action:
            - dynamodb:PutItem
            Resource:
              Fn::GetAtt:
              - OffersTable
              - Arn
  AuthFunction:
    Type: AWS::Serverless::Function
    Description: Handles user registration, login, and profile retrieval with bcrypt
      password hashing and JWT tokens.
    Properties:
      FunctionName:
        Fn::Sub: tng-finhack-${Environment}-auth
      Handler: handler.handler
      CodeUri: AuthFunction
      Role:
        Fn::GetAtt:
        - AuthFunctionRole
        - Arn
      Environment:
        Variables:
          USERS_TABLE:
            Ref: UsersTable
          JWT_SECRET: tng-finhack-jwt-secret-2026-hackathon
          LOG_LEVEL: INFO
      Timeout: 30
      MemorySize: 256
      Events:
        AuthRegister:
          Type: Api
          Properties:
            Path: /api/auth/register
            Method: POST
            RestApiId:
              Ref: TnGApiGateway
        AuthLogin:
          Type: Api
          Properties:
            Path: /api/auth/login
            Method: POST
            RestApiId:
              Ref: TnGApiGateway
        AuthMe:
          Type: Api
          Properties:
            Path: /api/auth/me
            Method: GET
            RestApiId:
              Ref: TnGApiGateway
    Metadata:
      SamResourceId: AuthFunction
  AuthFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: tng-finhack-${Environment}-auth-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: AuthDynamoAccessPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ReadWriteUsers
            Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            Resource:
              Fn::GetAtt:
              - UsersTable
              - Arn
  ScoringFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: tng-finhack-${Environment}-scoring-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: ScoringDynamoAccessPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ReadAndUpdateInvoices
            Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            Resource:
            - Fn::GetAtt:
              - InvoicesTable
              - Arn
            - Fn::Sub: ${InvoicesTable.Arn}/index/SmeIdIndex
          - Sid: CreateOffers
            Effect: Allow
            Action:
            - dynamodb:PutItem
            - dynamodb:Query
            Resource:
            - Fn::GetAtt:
              - OffersTable
              - Arn
            - Fn::Sub: ${OffersTable.Arn}/index/SmeIdIndex
  DisburseFunction:
    Type: AWS::Serverless::Function
    Description: Accepts a financing offer, performs idempotent disbursement with
      DuitNow mock, writes ledger, and updates wallet balance atomically.
    Properties:
      FunctionName:
        Fn::Sub: tng-finhack-${Environment}-disburse
      Handler: handler.handler
      CodeUri: DisburseFunction
      Role:
        Fn::GetAtt:
        - DisbursementFunctionRole
        - Arn
      Environment:
        Variables:
          OFFERS_TABLE:
            Ref: OffersTable
          USERS_TABLE:
            Ref: UsersTable
          INVOICES_TABLE:
            Ref: InvoicesTable
          TRANSACTIONS_TABLE:
            Ref: TransactionsTable
          LOG_LEVEL: INFO
          MOCK_PAYMENT_GATEWAY_DELAY: '1.5'
      Timeout: 30
      MemorySize: 256
      Events:
        DisbursePost:
          Type: Api
          Properties:
            Path: /api/disburse
            Method: POST
            RestApiId:
              Ref: TnGApiGateway
    Metadata:
      SamResourceId: DisburseFunction
  DisbursementFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: tng-finhack-${Environment}-disbursement-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DisbursementDynamoAccessPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ReadOffersAndUsers
            Effect: Allow
            Action:
            - dynamodb:GetItem
            Resource:
            - Fn::GetAtt:
              - UsersTable
              - Arn
            - Fn::GetAtt:
              - OffersTable
              - Arn
            - Fn::GetAtt:
              - InvoicesTable
              - Arn
          - Sid: UpdateWalletAndFundingState
            Effect: Allow
            Action:
            - dynamodb:UpdateItem
            Resource:
            - Fn::GetAtt:
              - UsersTable
              - Arn
            - Fn::GetAtt:
              - OffersTable
              - Arn
            - Fn::GetAtt:
              - InvoicesTable
              - Arn
          - Sid: WriteDisbursementLedger
            Effect: Allow
            Action:
            - dynamodb:PutItem
            Resource:
              Fn::GetAtt:
              - TransactionsTable
              - Arn
  ReconciliationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: tng-finhack-${Environment}-reconciliation-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: ReconciliationReadOnlyPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Sid: ReadLedgerForReports
            Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
            Resource:
            - Fn::GetAtt:
              - UsersTable
              - Arn
            - Fn::GetAtt:
              - InvoicesTable
              - Arn
            - Fn::Sub: ${InvoicesTable.Arn}/index/SmeIdIndex
            - Fn::GetAtt:
              - OffersTable
              - Arn
            - Fn::Sub: ${OffersTable.Arn}/index/SmeIdIndex
            - Fn::GetAtt:
              - TransactionsTable
              - Arn
Outputs:
  InvoiceUploadsBucketName:
    Description: S3 bucket used for invoice uploads before OCR and underwriting.
    Value:
      Ref: InvoiceUploadsBucket
  InvoiceWebhookApiUrl:
    Description: URL for the Alibaba Cloud invoice webhook endpoint.
    Value:
      Fn::Sub: https://${TnGApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/webhook/invoice-parsed
  DisburseApiUrl:
    Description: URL for the disbursement API endpoint.
    Value:
      Fn::Sub: https://${TnGApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/disburse
  AuthApiUrl:
    Description: URL for the auth API endpoints (login, register, me).
    Value:
      Fn::Sub: https://${TnGApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api/auth
  UsersTableName:
    Description: DynamoDB table storing SME user profiles.
    Value:
      Ref: UsersTable
  InvoicesTableName:
    Description: DynamoDB table storing invoice records.
    Value:
      Ref: InvoicesTable
  OffersTableName:
    Description: DynamoDB table storing financing offers.
    Value:
      Ref: OffersTable
  TransactionsTableName:
    Description: DynamoDB table storing cashflow and financing transactions.
    Value:
      Ref: TransactionsTable
